<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact · PrimeNetwork S1</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body>
    
    <!-- Background is handled entirely by CSS Variables -->
    <div class="bg-image"></div>
    
    <nav class="ios-nav">
        <div class="brand">
            <i class="fas fa-cube brand-icon"></i>
            <span class="brand-name">PrimeNetwork</span>
        </div>
        
        <ul class="nav-items">
            <li><a href="index.html"><i class="fas fa-house"></i> Home</a></li>
            <li><a href="about.html"><i class="fas fa-circle-info"></i> About</a></li>
            <li><a href="members.html"><i class="fas fa-users"></i> Members</a></li>
            <li><a href="store/"><i class="fas fa-cart-shopping"></i> Store</a></li>
            <li><a href="leaderboards.html"><i class="fas fa-trophy"></i> LeaderBoard</a></li>
            <li><a href="contact.html"><i class="fas fa-envelope"></i> Contact</a></li>
        </ul>
    </nav>

    <main class="page-content">
        <h1 class="page-title">Get in Touch</h1>
        
        <div class="contact-grid">
            <div class="contact-info">
                <h3><i class="fas fa-comments" style="color: #f5d742;"></i> Discord</h3>
                <p>Join our community for support, events, and chat!</p>
                <a href="https://discord.gg/kAsbvsGXQm" target="_blank" class="btn-outline"><i class="fas fa-comments"></i> PrimeNetwork Discord</a>
                
                <h3><i class="fas fa-server" style="color: #f5d742;"></i> Server IP</h3>
                <p class="ip-highlight">primesmp.loca.lol</p>
            </div>
            
            <div class="contact-form">
                <h3>Send a Message</h3>
                
                <form id="my-form" action="https://formspree.io/f/mkolaaal" method="POST">
                    
                    <input type="text" id="name" name="name" placeholder="Your name" required />
                    <input type="email" id="email" name="email" placeholder="Your email" required />
                    
                    <select id="subject" name="subject" class="form-select" required>
                        <option value="" disabled selected>Select a topic...</option>
                        <option value="General Question">General Question</option>
                        <option value="Staff Application">Staff Application</option>
                        <option value="Ban Appeal">Ban Appeal</option>
                        <option value="Mute Appeal">Mute Appeal</option>
                        <option value="Unban Request">Unban Request</option>
                        <option value="Report a Player">Report a Player</option>
                        <option value="Bug Report">Bug Report</option>
                        <option value="Suggestion / Feedback">Suggestion / Feedback</option>
                        <option value="Partnership / Promotion">Partnership / Promotion</option>
                        <option value="Store / Rank Issue">Store / Rank Issue</option>
                        <option value="Technical Issue (Crash / Lag)">Technical Issue (Crash / Lag)</option>
                        <option value="Question about Rules">Question about Rules</option>
                        <option value="Whitelist Request">Whitelist Request</option>
                        <option value="Event Idea">Event Idea</option>
                        <option value="Other">Other</option>
                    </select>
                    
                    <textarea id="message" name="message" rows="4" placeholder="Your message..." required></textarea>
                    
                    <button type="button" id="submit-btn" class="cta-primary"><i class="fas fa-paper-plane"></i> Send</button>
                    
                    <div id="form-status" style="margin-top: 15px; text-align: center; font-weight: 600; display: none;"></div>
                </form>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>Designed by Yoloo, Mwaa</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('my-form');
            const submitBtn = document.getElementById('submit-btn');
            const formStatus = document.getElementById('form-status');

            submitBtn.addEventListener('click', function(e) {
                e.preventDefault();

                const formData = new FormData(form);
                const data = Object.fromEntries(formData.entries());

                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
                submitBtn.disabled = true;
                formStatus.style.display = 'none';

                fetch('https://formspree.io/f/mkolaaal', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                })
                .then(response => {
                    if (response.ok) {
                        formStatus.style.display = 'block';
                        formStatus.style.color = '#f5d742';
                        formStatus.innerHTML = '✅ Message sent successfully! We will get back to you soon.';
                        form.reset();
                    } else {
                        formStatus.style.display = 'block';
                        formStatus.style.color = '#ff3b3b';
                        formStatus.innerHTML = '❌ Something went wrong. Please try again later.';
                    }
                })
                .catch(error => {
                    formStatus.style.display = 'block';
                    formStatus.style.color = '#ff3b3b';
                    formStatus.innerHTML = '❌ Network error. Check your connection.';
                })
                .finally(() => {
                    submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Send';
                    submitBtn.disabled = false;
                });
            });
        });
    </script>

</body>
</html>
